name: 🌌 SUD9.0 自動実行
on: [push, pull_request, workflow_dispatch]

jobs:
  sud9:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: 📦 インストール
      run: pip install numpy matplotlib
      
    - name: 🚀 SUD9.0実行  ← **ここを修正**
      run: python sud9_run.py     # sud9_data.py → sud9_run.py
      
    - name: 📤 成果物
      uses: actions/upload-artifact@v4
      with:
        name: sud9-results
        path: |
          sud9_result.json
          sud9_plot.png
